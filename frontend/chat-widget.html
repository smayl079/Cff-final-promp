<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat Widget</title>
    <style>
        :root {
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --bg-color: #ffffff;
            --text-color: #333333;
            --light-bg: #f5f7f9;
            --mechanic-msg-bg: #e9ecef;
            --customer-msg-bg: #0066cc;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
        }

        /* Widget Container */
        .chat-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /* Floating Button */
        .chat-toggle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        .chat-toggle-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .chat-toggle-btn svg {
            width: 30px;
            height: 30px;
            fill: currentColor;
            transition: var(--transition);
        }

        .chat-toggle-btn.active svg {
            transform: rotate(90deg);
            opacity: 0;
        }

        .chat-toggle-btn .close-icon {
            position: absolute;
            transform: rotate(-90deg);
            opacity: 0;
        }

        .chat-toggle-btn.active .close-icon {
            transform: rotate(0);
            opacity: 1;
        }

        /* Chat Window */
        .chat-window {
            width: 350px;
            height: 500px;
            max-height: calc(100vh - 100px);
            background-color: var(--bg-color);
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: var(--transition);
            transform-origin: bottom right;
        }

        .chat-window.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* Header */
        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title-info {
            display: flex;
            flex-direction: column;
        }

        .chat-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            opacity: 0.9;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #28a745;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 4px rgba(40, 167, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        .chat-close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
            padding: 0;
            line-height: 1;
        }

        .chat-close-btn:hover {
            opacity: 1;
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.mechanic {
            align-self: flex-start;
            background-color: var(--mechanic-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }

        .message.customer {
            align-self: flex-end;
            background-color: var(--customer-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--mechanic-msg-bg);
            padding: 12px 16px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            align-items: center;
            gap: 4px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #888;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .chat-input-area {
            padding: 15px;
            background-color: var(--bg-color);
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .chat-send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }

        .chat-send-btn:hover {
            background-color: var(--primary-hover);
        }

        .chat-send-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transform: translateX(-1px);
        }

        .chat-send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .chat-window {
                width: calc(100vw - 40px);
                height: calc(100vh - 120px);
            }
        }
    </style>
</head>
<body>

    <!-- Chat Widget HTML -->
    <div class="chat-widget-container">
        <!-- Chat Window -->
        <div class="chat-window" id="chat-window">
            <!-- Header -->
            <div class="chat-header">
                <div class="chat-title-info">
                    <div class="chat-title">Chat with a Mechanic</div>
                    <div class="chat-status">
                        <span class="status-dot"></span> Online
                    </div>
                </div>
                <button class="chat-close-btn" id="chat-close-btn" aria-label="Close chat">&times;</button>
            </div>

            <!-- Messages Stream -->
            <div class="chat-messages" id="chat-messages">
                <div class="message mechanic">
                    Hello! How can I help you with your car today?
                </div>
                
                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typing-indicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="Type your message..." autocomplete="off" />
                <button class="chat-send-btn" id="chat-send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Floating Action Button -->
        <button class="chat-toggle-btn" id="chat-toggle-btn" aria-label="Toggle chat">
            <!-- Chat Icon -->
            <svg class="chat-icon" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path>
            </svg>
            <!-- Close Icon inside Button -->
            <svg class="close-icon" viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
            </svg>
        </button>
    </div>

    <!-- Chat Widget JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('chat-toggle-btn');
            const closeBtn = document.getElementById('chat-close-btn');
            const chatWindow = document.getElementById('chat-window');
            const messagesContainer = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send-btn');
            const typingIndicator = document.getElementById('typing-indicator');

            // Toggle Chat window
            const toggleChat = () => {
                chatWindow.classList.toggle('open');
                toggleBtn.classList.toggle('active');
                if (chatWindow.classList.contains('open')) {
                    chatInput.focus();
                }
            };

            toggleBtn.addEventListener('click', toggleChat);
            closeBtn.addEventListener('click', toggleChat);

            // Auto-scroll to bottom
            const scrollToBottom = () => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            };

            // Add a new message
            const addMessage = (text, sender) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${sender}`;
                msgDiv.textContent = text;
                
                // Insert message before typing indicator
                messagesContainer.insertBefore(msgDiv, typingIndicator);
                scrollToBottom();
            };

            // Handle Input & Output
            const handleSend = () => {
                const text = chatInput.value.trim();
                if (!text) return;

                // 1. Add Customer Message
                addMessage(text, 'customer');
                chatInput.value = '';
                
                // 2. Simulate Mechanic typing...
                typingIndicator.classList.add('active');
                scrollToBottom();

                // 3. Mechanic replies after a delay
                setTimeout(() => {
                    typingIndicator.classList.remove('active');
                    // Simple simulated responses
                    const replies = [
                        "I can certainly help you with that. Can you provide your vehicle make and model?",
                        "Let me check into that for you. One moment please.",
                        "That sounds like a common issue. When would you like to bring it in?",
                        "Thanks for the details. Do you hear any strange noises when this happens?"
                    ];
                    const randomReply = replies[Math.floor(Math.random() * replies.length)];
                    addMessage(randomReply, 'mechanic');
                }, 1500 + Math.random() * 1000); // 1.5 - 2.5s delay
            };

            sendBtn.addEventListener('click', handleSend);
            
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSend();
                }
            });

            // Enable/Disable Send button visually based on input
            chatInput.addEventListener('input', () => {
                // optional: you could disable button if chatInput.value.trim() === ''
            });
        });
    </script>
</body>
</html>
